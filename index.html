<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <script src="javascript.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>

    <div class="container">
        <div class="score-container">
            <div class="player-score-container">
                <p class="player-score">0</p>
                <span>player</span>
            </div>
            <div class="computer-score-container">
                <p class="computer-score">0</p>
                <span>computer</span>
            </div>
        </div>
        <div class="buttons-container">
            <button class="rock"><img src="images/piedra.png" class="rock"></button>
            <button class="paper"><img src="images/papel.png" class="paper"></button>
            <button class="scissor"><img src="images/tijera.png" class="scissor"></button>
        </div>
        <div class="message">
            <p class="game-message">Select one option to</p>
            <p class="result-message">Start the game</p>
        </div>
    </div>
    <footer>RoMaDev©</footer>

</body>

</html>
